<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E91E63">
  <meta name="description" content="LoveSync - Two Hearts, One App">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LoveSync">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>LoveSync</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1A1A2E;
      overflow: hidden;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #E91E63, #9C27B0, #3F51B5);
      z-index: 9999;
    }
    #loading .heart { 
      width: 80px; 
      height: 80px; 
      fill: rgba(255, 255, 255, 0.9);
      animation: pulse 1.5s ease-in-out infinite; 
    }
    #loading h1 { 
      color: white; 
      font-family: sans-serif; 
      font-size: 42px; 
      font-weight: bold;
      margin-top: 16px; 
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    #loading p { 
      color: rgba(255,255,255,0.8); 
      font-family: sans-serif; 
      font-size: 16px; 
      margin: 0;
      letter-spacing: 4px; 
    }
    #loading .beta-badge {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      vertical-align: middle;
      margin-left: 12px;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  </style>
  <script src="flutter.js"></script>
</head>
<body>
  <div id="loading">
    <svg class="heart" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    <h1>LoveSync <span class="beta-badge">BETA</span></h1>
    <p>Two Hearts, One App</p>
  </div>
  <script src="flutter_bootstrap.js"></script>
  <script>
    const loadingEl = document.getElementById('loading');
    const observer = new MutationObserver(() => {
      if (document.querySelector('flt-canvas, canvas')) {
        if (loadingEl) loadingEl.style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(() => {
      if (loadingEl) loadingEl.style.display = 'none';
      observer.disconnect();
    }, 8000);
  </script>
</body>
</html>
