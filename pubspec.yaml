name: lovesync
description: A modern couple app for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  sqflite: ^2.3.0
  sembast: ^3.7.0
  sembast_web: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  image_picker: ^1.0.4
  flutter_local_notifications: ^18.0.0
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  lottie: ^2.7.0
  uuid: ^4.2.1
  flutter_animate: ^4.3.0
  table_calendar: ^3.1.0
  photo_view: ^0.14.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  mime: ^1.0.4
  timezone: ^0.9.2
  google_sign_in: ^6.1.5
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  swipe_to: ^1.0.2
  cached_network_image: ^3.3.0
  http: ^1.1.0
  firebase_messaging: ^15.2.10


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/lottie/
