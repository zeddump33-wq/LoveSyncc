<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E91E63">
  <meta name="description" content="LoveSync - Two Hearts, One App">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LoveSync">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>LoveSync</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1A1A2E;
      overflow: hidden;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #E91E63, #9C27B0, #3F51B5);
      z-index: 9999;
    }
    #loading .heart { font-size: 64px; animation: pulse 1.5s ease-in-out infinite; }
    #loading h1 { color: white; font-family: sans-serif; font-size: 32px; margin-top: 16px; }
    #loading p { color: rgba(255,255,255,0.8); font-family: sans-serif; font-size: 14px; letter-spacing: 4px; }
    #loading .spinner {
      margin-top: 32px;
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="flutter.js"></script>
</head>
<body>
  <div id="loading">
    <div class="heart">&#x2764;&#xFE0F;</div>
    <h1>LoveSync</h1>
    <p>Two Hearts, One App</p>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js"></script>
  <script>
    // Hide loading overlay once Flutter canvas appears
    const loadingEl = document.getElementById('loading');
    const observer = new MutationObserver(() => {
      if (document.querySelector('flt-canvas, canvas')) {
        if (loadingEl) loadingEl.style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    // Safety fallback: hide after 8 seconds
    setTimeout(() => {
      if (loadingEl) loadingEl.style.display = 'none';
      observer.disconnect();
    }, 8000);
  </script>
</body>
</html>
